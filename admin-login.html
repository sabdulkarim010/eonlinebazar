<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | EonlineBazar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <div class="login-container">
        <h2>Admin Login</h2>
        <p>Only for Admin Abdul Karim</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="adminEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="adminPass" placeholder="Password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        
        <p id="message"></p>
    </div>

    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
