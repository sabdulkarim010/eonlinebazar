<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Account | EonlineBazar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-container">
        
        <button class="auth-close-circle" onclick="window.location.href='/index'" title="Go Back">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div id="login-section">
            
            <div class="auth-header-brand">
                <div class="brand-icon-circle">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h2 class="auth-title">Sign In to Your Account</h2>
            </div>
            
            <form id="loginForm" novalidate>
                
                <div class="floating-group">
                    <input type="email" id="loginEmail" required placeholder=" ">
                    <label for="loginEmail">Email Address</label>
                    <div id="login-email-error" class="error-text"></div>
                </div>
                
                <div class="floating-group password-group">
                    <input type="password" id="loginPass" required placeholder=" ">
                    <label for="loginPass">Password</label>
                    <button type="button" class="toggle-password" id="toggleLoginPass" title="Show/Hide Password">
                        <i class="fa-regular fa-eye" id="loginEyeIcon"></i>
                    </button>
                    <div id="login-pass-error" class="error-text"></div>
                </div>

                <div class="auth-options" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px;">
                    <label class="remember-me" style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #64748b;">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" id="forgotPasswordLink" class="forgot-password-link hidden-forgot-link" style="display: none; color: #e74c3c; font-weight: 600; text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p class="auth-switch-text">
                New to EonlineBazar? <a href="/register">Create Account</a>
            </p>
        </div>

        <div id="success-message" style="display: none; text-align: center; padding: 10px;"></div>

    </div>
</div>

<div id="global-site-footer"></div>
<script src="js/session-guard.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
