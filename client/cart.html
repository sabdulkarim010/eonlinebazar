<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - EonlineBazar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout-step-header.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="checkout-step-header">
        <div class="checkout-step-header__container">
            <div class="checkout-step-header__left">
                <a href="/" class="checkout-step-header__back-link">
                    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                    <span class="checkout-step-header__back-desktop">Continue Shopping</span>
                    <span class="checkout-step-header__back-mobile">Back</span>
                </a>
            </div>
            <div class="checkout-step-header__center">
                <span class="checkout-step-header__secure-badge">
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <span class="checkout-step-header__secure-desktop">SECURE CHECKOUT</span>
                    <span class="checkout-step-header__secure-mobile">SECURE</span>
                </span>
                <span class="checkout-step-header__step">Step 1 of 3</span>
            </div>
            <a href="/" class="checkout-step-header__brand" data-store-logo-slot data-logo-variant="checkout-header" aria-label="EonlineBazar Home"></a>
        </div>
    </header>

    <div class="shopping-cart-main-container">
        
        <div class="cart-title-area">
            <h2>
                <i class="fa-solid fa-cart-shopping"></i> Shopping Cart
            </h2>
        </div>

        <div id="cartItemsContainer">
            </div>

        <div class="cart-totals-bottom-section" id="cartSummarySection">
            <p class="subtotal-row">Selected Items: <strong id="cartSelectedItemsCount">0 Items</strong></p>
            <p class="subtotal-row">Subtotal: <strong id="cartSubtotalAmount">৳0</strong></p>
            <h3 class="grand-total-row">Total Amount: <span id="cartGrandTotalAmount">৳0</span></h3>
            
            <button type="button" id="proceedToCheckoutBtn" class="checkout-redirect-btn">
                Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

    </div>

        <!-- footer calling -->
        <div id="global-site-footer"></div>
    <script src="js/session-guard.js"></script>
    <script src="js/main.js"></script>

    <script src="js/cart.js"></script>
</body>
</html>
