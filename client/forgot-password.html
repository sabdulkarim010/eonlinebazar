<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | eOnlineBazar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/forget-password.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-container">
        
        <button class="auth-close-circle" onclick="window.location.href='/login'" title="Back to Login">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div id="request-reset-section">
            <div class="auth-header-brand">
                <div class="brand-icon-circle">
                    <i class="fa-solid fa-unlock-keyhole"></i>
                </div>
                <h2 class="auth-title">Reset Password</h2>
                <p class="fp-subtitle-text">Enter your email to receive an OTP.</p>
            </div>
            
            <form id="forgotPasswordForm" novalidate>
                <div class="floating-group">
                    <input type="email" id="resetEmail" required placeholder=" ">
                    <label for="resetEmail">Registered Email Address</label>
                </div>

                <button type="submit" class="btn-primary" id="sendOtpBtn">Send OTP</button>
            </form>
        </div>

        <div id="verify-reset-section" class="hidden-section">
            <div class="auth-header-brand">
                <div class="brand-icon-circle">
                    <i class="fa-solid fa-shield-check"></i>
                </div>
                <h2 class="auth-title">Create New Password</h2>
                <p id="otpSentMessage" class="fp-success-text">OTP sent to your email!</p>
            </div>
            
            <form id="resetPasswordForm" novalidate>
                <div class="floating-group">
                    <input type="text" id="resetOtp" required placeholder=" " maxlength="6">
                    <label for="resetOtp">Enter 6-Digit OTP</label>
                </div>

                <div class="floating-group password-group">
                    <input type="password" id="newPassword" required placeholder=" ">
                    <label for="newPassword">New Password</label>
                    <button type="button" class="toggle-password" id="toggleNewPass" title="Show/Hide Password">
                        <i class="fa-regular fa-eye" id="newEyeIcon"></i>
                    </button>
                </div>

                <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
            </form>
        </div>

    </div>
</div>

<div id="global-site-footer"></div>
<script src="js/main.js"></script>

<script src="js/forgot-password.js"></script>

</body>
</html>
